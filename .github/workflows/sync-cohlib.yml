name: Sync cohlib

on:
  repository_dispatch:
    types: [cohlib-updated]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - uses: dtolnay/rust-toolchain@stable

      - name: Update cohlib-rb to latest
        run: cargo update -p cohlib-rb --manifest-path ext/cohlib/Cargo.toml

      - name: Check build
        run: cargo check --manifest-path ext/cohlib/Cargo.toml

      - name: Commit updated Cargo.lock
        run: |
          git diff --quiet ext/cohlib/Cargo.lock && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ext/cohlib/Cargo.lock
          git commit -m "chore: update cohlib to ${{ github.event.client_payload.sha }}"
          git push
